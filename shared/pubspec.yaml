name: shared
description: Shared models, services, widgets and utils for WTF Platform.
version: 0.0.1
publish_to: 'none'

environment:
  sdk: ^3.11.5
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Storage
  hive_flutter: ^1.1.0

  # Utilities
  equatable: ^2.0.7
  uuid: ^4.5.1
  intl: ^0.20.2
  http: ^1.2.2
  flutter_riverpod: ^2.6.1
  package_info_plus: ^8.3.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
